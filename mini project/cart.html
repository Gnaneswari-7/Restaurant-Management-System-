<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>

    <style>
        .product-card {
            width: 250px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-family: Arial;
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .product-card h3 {
            margin: 10px 0;
        }

        .buy-btn {
            background-color: #ff6600;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .buy-btn:hover {
            background-color: #e65c00;
        }
    </style>
</head>

<body>

<div class="product-card">
    <img src="https://via.placeholder.com/250" alt="Product Image">
       <button class="buy-btn" onclick="buyNow()">Buy Now</button>
</div>

<script>
function buyNow() {
    window.location.href = "finalpage.html"; // redirect to checkout page
}
</script>

</body>
</html>
